name: Vouch (PR gate)

# Check PR author trust without closing community PRs. Runs under
# `pull_request_target`, but this job does NO checkout and runs NO PR code — it
# only reads .github/VOUCHED.td from the base repo and calls the GitHub API.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read # read VOUCHED.td from the base branch
  pull-requests: read
  issues: write # add/remove PR labels and post the one-time needs-vouch note

concurrency:
  group: vouch-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - id: vouch
        uses: mitchellh/vouch/action/check-pr@v1
        with:
          pr-number: ${{ github.event.pull_request.number }}
          auto-close: false
          require-vouch: true # report unvouched, but leave the PR open
          # vouched-file: .github/VOUCHED.td (default)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Survivors of the gate (vouched, or auto-allowed collaborators/bots) get
      # a FRESH `vouched` label on every (re)open / ready-for-review. robomp
      # reviews ONLY on that label event (ROBOMP_PR_REVIEW_TRIGGER=vouched_label),
      # so review is always triggered by a just-validated PR, never a stale label.
      - name: Label vouched PRs for robomp review
        if: ${{ steps.vouch.outputs.status == 'vouched' || steps.vouch.outputs.status == 'allowed' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh label create vouched --repo "$REPO" --color 2da44e --description "Passed the vouch gate" --force
          # remove+add so a fresh `labeled` event fires even when the label
          # persisted across close/reopen (re-adding an existing label emits no
          # event). The check above just re-validated, so trust is never stale.
          gh issue edit "$PR" --repo "$REPO" --remove-label vouched || true
          gh issue edit "$PR" --repo "$REPO" --remove-label needs-vouch || true
          gh issue edit "$PR" --repo "$REPO" --add-label vouched

      - name: Mark PRs that still need a vouch
        if: ${{ steps.vouch.outputs.status == 'closed' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          gh label create needs-vouch --repo "$REPO" --color d29922 --description "Maintainer vouch required before automated review" --force
          gh issue edit "$PR" --repo "$REPO" --remove-label vouched || true
          gh issue edit "$PR" --repo "$REPO" --add-label needs-vouch

          existing="$(gh api "repos/$REPO/issues/$PR/comments" --jq \
            '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("needs a maintainer vouch")))] | length')"
          if [ "$existing" = "0" ]; then
            gh issue comment "$PR" --repo "$REPO" --body "Thanks @${AUTHOR}. This PR is open, but it needs a maintainer vouch before automated review starts. A maintainer can run \`!vouch @${AUTHOR}\` in a discussion, or review this PR manually and add the \`vouched\` label when appropriate."
          fi
